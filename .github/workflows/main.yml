name: Build and Deploy

on:
  push:
    branches:
      - main # Change to your default branch if different

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: "24" # Change according to your project's requirement

      - name: Install dependencies
        run: npm ci

      - name: Build the project
        run: npm run build # Customize this command as needed

      - name: Test the project
        run: npm test # Customize this command as needed

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          folder: build # Adjust this to your built folder
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
